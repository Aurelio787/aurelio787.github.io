<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Rechner</title>
    <link rel="stylesheet" href="rechner.css">
</head>
<body>

    <div class="calculator">
        <input type="text" id="alfred" value="0" readonly>

        <div class="buttons">
            <button id="button7">7</button>
            <button id="button8">8</button>
            <button id="button9">9</button>
            <button id="buttonGETEILT">/</button>
        </div>
        <div class="buttons">
            <button id="button4">4</button>
            <button id="button5">5</button>
            <button id="button6">6</button>
            <button id="buttonMAL">*</button> </div>
        <div class="buttons">
            <button id="button1">1</button>
            <button id="button2">2</button>
            <button id="button3">3</button>
            <button id="buttonMINUS">-</button>
        </div>
        <div class="buttons">
            <button id="buttonClear">C</button>    
            <button id="button0">0</button>    
            <button id="buttonGLEICH" hidden>=</button>
            <button id="Gleich">=</button>
            <button id="buttonPLUS">+</button>

        </div>           
    </div>

    <script src="rechner.js"></script>
</body>
</html>
